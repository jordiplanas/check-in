<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src 'self' https://cupra.metaversotechnologies.com; style-src 'self' 'unsafe-inline'; img-src * data:;">
    <title>Cupra Check-in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Cupra_black.png" alt="Cupra Logo" class="logo">
            <h1>Acceso NFC</h1>
        </header>

        <main id="app">
            <div id="status-card" class="card">
                <p id="message">Presiona el botón para comenzar a escanear la pulsera.</p>
                <div id="user-info" class="hidden">
                    <hr>
                    <h2>Bienvenido,</h2>
                    <p class="user-name"><span id="first_name"></span> <span id="last_name"></span></p>
                    <p class="tag-id">ID: <span id="display-tag"></span></p>
                </div>
            </div>

            <button id="scanBtn" class="btn-primary">ESCANEAR PULSERA</button>
        </main>

        <footer>
            <p>© 2026 Metaverso Technologies</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
